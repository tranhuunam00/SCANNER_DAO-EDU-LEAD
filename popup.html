<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAO EDU Lead Scanner</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="logo">D</div>
        <div>
          <h1>DAO EDU Scanner</h1>
          <p>Thử nghiệm quét Facebook</p>
        </div>
      </header>

      <section class="notice">
        Dán link bài Facebook hoặc để trống để quét sâu bài đang mở.
      </section>

      <div class="actions">
        <input
          id="postUrl"
          type="url"
          placeholder="Dán link bài viết Facebook..."
          autocomplete="off"
        />
        <button id="scan" class="primary">Quét sâu bài viết đang mở</button>

        <div class="batch-settings">
          <label>
            <span>Số bài viết cần quét:</span>
            <input type="number" id="batchCount" value="10" min="1" max="500">
          </label>
          <label>
            <span>Giới hạn mỗi bài (giây):</span>
            <input type="number" id="batchPostTime" value="120" min="10">
          </label>
          <label>
            <span>Tổng thời gian quét (phút):</span>
            <input type="number" id="batchTotalTime" value="30" min="1">
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="batchIgnoreScanned" checked>
            <span>Chỉ quét bài mới (Bỏ qua bài đã dán tem)</span>
          </label>
        </div>

        <button id="batch" class="batch">Bắt đầu Quét hàng loạt</button>
        <button id="continueBatch" class="batch hidden">Quét tiếp phần còn lại</button>
      </div>

      <section id="batchPanel" class="batch-panel hidden">
        <div class="batch-heading">
          <strong>Quét hàng loạt</strong>
          <span id="batchStatus"></span>
        </div>
        <div class="progress"><span id="batchProgress"></span></div>
        <p id="batchMessage"></p>
        <div id="batchHistory" class="batch-history"></div>
        <button id="stopBatch" class="batch-stop hidden">
          Dừng và xóa job nền
        </button>
      </section>

      <section class="stats">
        <article>
          <strong id="postCount">0</strong>
          <span>Bài viết</span>
        </article>
        <article>
          <strong id="commentCount">0</strong>
          <span>Bình luận</span>
        </article>
        <article>
          <strong id="savedCount">0</strong>
          <span>Đã lưu</span>
        </article>
      </section>

      <p id="status" class="status">Sẵn sàng.</p>

      <section class="sync-panel">
        <div class="section-title">
          <h2>Đồng bộ BE</h2>
          <span id="syncState">Chưa đồng bộ</span>
        </div>
        <div class="sync-fields">
          <input
            id="apiBaseUrl"
            type="url"
            placeholder="http://localhost:5000/api"
            autocomplete="off"
          />
        </div>
        <button id="syncBackend" class="sync-button">
          Đồng bộ Data lên BE & Xóa local
        </button>
        <button id="forceSyncTem" class="sync-button" style="margin-top: 8px; background-color: #2563eb; color: #ffffff; border: none; font-weight: bold;">
          Tải lại Tem đã quét từ BE xuống
        </button>
        <p id="syncMessage" class="sync-message"></p>
      </section>



      <section>
        <div class="section-title">
          <h2>Dữ liệu gần nhất</h2>
          <span id="scanTime"></span>
        </div>
        <div id="preview" class="preview">
          <div class="empty">Chưa có dữ liệu.</div>
        </div>
      </section>
      <footer>
        <button id="forceStop" class="danger clear-all">Dừng & Xóa toàn bộ tiến trình ngầm</button>
      </footer>
    </main>
    <script src="scanner-config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
